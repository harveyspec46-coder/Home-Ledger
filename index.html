<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Home Staff Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F1E7;
    --surface:#FFFEFB;
    --ink:#252017;
    --ink-soft:#6B6354;
    --line:#DCD2BC;
    --brass:#B8893A;
    --brass-bg:#F3E6CC;
    --sage:#4F6B52;
    --sage-bg:#DFE9DD;
    --denim:#3E5C76;
    --denim-bg:#DEE6ED;
    --clay:#A8573F;
    --clay-bg:#F1DCD2;
    --plum:#6B4C6B;
    --plum-bg:#E8DCE6;
    --gray:#5B5648;
    --gray-bg:#E7E2D5;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image: repeating-linear-gradient(to bottom, transparent 0, transparent 27px, rgba(180,160,120,0.07) 28px);
    pointer-events:none;
    z-index:0;
  }
  #app{position:relative; z-index:1; max-width:560px; margin:0 auto; padding:18px 14px 90px;}
  .ledger-title{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:26px;
    letter-spacing:-0.01em;
    margin:4px 0 2px;
    cursor:text;
    display:inline-block;
  }
  .ledger-sub{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.06em;
  }
  .tabs{
    display:flex;
    gap:6px;
    margin:18px 0 16px;
    overflow-x:auto;
    border-bottom:1px solid var(--line);
    padding-bottom:0;
  }
  .tab-btn{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:14px;
    background:none;
    border:none;
    padding:8px 10px 10px;
    color:var(--ink-soft);
    cursor:pointer;
    white-space:nowrap;
    border-bottom:3px solid transparent;
    margin-bottom:-1px;
  }
  .tab-btn.active{color:var(--ink); border-bottom-color:var(--brass);}
  .tab-btn:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
    outline:2px solid var(--denim); outline-offset:2px;
  }
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 14px 12px;
    margin-bottom:12px;
    box-shadow:0 1px 0 rgba(60,50,30,0.04);
  }
  .tab-card{position:relative; padding-top:18px;}
  .role-tab{
    position:absolute; top:-1px; left:14px;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    font-weight:500;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:3px 9px 4px;
    border-radius:0 0 8px 8px;
  }
  .row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .name-line{font-family:'Fraunces',serif; font-weight:600; font-size:17px;}
  .meta-line{font-size:12.5px; color:var(--ink-soft); margin-top:2px;}
  .pill{
    display:inline-block; font-size:11px; font-family:'JetBrains Mono',monospace;
    padding:2px 7px; border-radius:20px; margin-right:4px; margin-top:4px;
  }
  .icon-btn{
    background:none; border:1px solid var(--line); border-radius:8px;
    width:30px; height:30px; font-size:15px; cursor:pointer; color:var(--ink-soft);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .icon-btn:active{background:var(--gray-bg);}
  .btn{
    font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px;
    border:none; border-radius:10px; padding:10px 16px; cursor:pointer;
  }
  .btn-primary{background:var(--ink); color:var(--bg);}
  .btn-ghost{background:none; border:1px solid var(--line); color:var(--ink);}
  .btn-block{width:100%;}
  .btn-sm{padding:6px 11px; font-size:12.5px; border-radius:8px;}
  .day-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .day-nav .label{font-family:'Fraunces',serif; font-weight:600; font-size:18px;}
  .day-nav .sub{font-size:12px; color:var(--ink-soft); font-family:'JetBrains Mono',monospace;}
  .empty{
    text-align:center; padding:30px 16px; color:var(--ink-soft); font-size:13.5px;
    border:1.5px dashed var(--line); border-radius:var(--radius);
  }
  .task-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line);}
  .task-row:last-child{border-bottom:none;}
  .checkbox{
    width:20px; height:20px; border-radius:6px; border:1.5px solid var(--ink-soft);
    flex-shrink:0; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:13px;
  }
  .checkbox.done{background:var(--sage); border-color:var(--sage); color:white;}
  .task-text{flex:1; font-size:14px;}
  .task-text.done{color:var(--ink-soft); text-decoration:line-through;}
  .week-grid{display:flex; flex-direction:column; gap:8px;}
  .week-day{
    background:var(--surface); border:1px solid var(--line); border-radius:12px;
    padding:10px 12px; cursor:pointer;
  }
  .week-day.is-today{border-color:var(--brass); box-shadow:0 0 0 1px var(--brass) inset;}
  .week-day-head{display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-soft); margin-bottom:5px;}
  .month-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
  .month-head{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-soft); text-align:center; padding-bottom:4px;}
  .month-cell{
    aspect-ratio:1; border-radius:9px; border:1px solid var(--line); background:var(--surface);
    display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;
    font-size:13px; gap:3px; position:relative;
  }
  .month-cell.muted{opacity:0.35;}
  .month-cell.is-today{border:1.5px solid var(--brass);}
  .month-cell.is-selected{background:var(--gray-bg);}
  .dots{display:flex; gap:2px; flex-wrap:wrap; justify-content:center; max-width:28px;}
  .dot{width:5px; height:5px; border-radius:50%;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.04em;}
  .field input, .field select, .field textarea{
    width:100%; padding:10px 11px; border:1px solid var(--line); border-radius:9px;
    font-family:'Inter',sans-serif; font-size:14.5px; background:var(--surface); color:var(--ink);
  }
  .day-chips{display:flex; gap:5px; flex-wrap:wrap;}
  .day-chip{
    width:38px; height:38px; border-radius:50%; border:1px solid var(--line); background:var(--surface);
    font-size:12px; font-weight:600; cursor:pointer; color:var(--ink-soft);
  }
  .day-chip.on{background:var(--ink); color:var(--bg); border-color:var(--ink);}
  .sheet-backdrop{
    position:fixed; inset:0; background:rgba(30,25,15,0.45); z-index:10;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .sheet{
    background:var(--bg); width:100%; max-width:560px; border-radius:20px 20px 0 0;
    padding:18px 16px 24px; max-height:88vh; overflow-y:auto;
  }
  .sheet-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .sheet-head h3{font-family:'Fraunces',serif; font-size:19px; margin:0;}
  .fab{
    position:fixed; bottom:20px; right:50%; transform:translateX(280px);
    background:var(--ink); color:var(--bg); border:none; width:52px; height:52px; border-radius:50%;
    font-size:24px; box-shadow:0 4px 14px rgba(0,0,0,0.25); cursor:pointer; z-index:5;
  }
  @media (max-width:600px){.fab{right:20px; transform:none;}}
  .stat-row{display:flex; justify-content:space-between; align-items:baseline; padding:8px 0; border-bottom:1px solid var(--line);}
  .stat-row:last-child{border-bottom:none;}
  .stat-num{font-family:'JetBrains Mono',monospace; font-weight:500;}
  .due-pos{color:var(--clay);}
  .due-zero{color:var(--sage);}
  .month-switch{display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:14px;}
  .month-switch .label{font-family:'Fraunces',serif; font-weight:600; font-size:17px; min-width:140px; text-align:center;}
  .role-Cook{background:var(--brass-bg); color:var(--brass);}
  .role-Gardener{background:var(--sage-bg); color:var(--sage);}
  .role-Housekeeper{background:var(--clay-bg); color:var(--clay);}
  .role-Driver{background:var(--denim-bg); color:var(--denim);}
  .role-Nanny{background:var(--plum-bg); color:var(--plum);}
  .role-Other{background:var(--gray-bg); color:var(--gray);}
  .dot-Cook{background:var(--brass);} .dot-Gardener{background:var(--sage);}
  .dot-Housekeeper{background:var(--clay);} .dot-Driver{background:var(--denim);}
  .dot-Nanny{background:var(--plum);} .dot-Other{background:var(--gray);}
  @media (prefers-reduced-motion: no-preference){
    .card, .week-day, .month-cell{transition:transform 0.12s ease;}
  }
</style>
</head>
<body>
<div id="app"><div class="empty">Loading your ledger…</div></div>

<script>
const ROLES = ["Cook","Gardener","Housekeeper","Driver","Nanny","Other"];
const DAY_LABELS = ["S","M","T","W","T","F","S"];
const DAY_FULL = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

let state = null;
let activeTab = "day";
let selectedDate = fmtDate(new Date());
let payMonth = todayYM();
let sheet = null; // {type, payload}

function pad(n){return String(n).padStart(2,"0");}
function fmtDate(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function todayYM(){const d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1);}
function parseDate(s){const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d);}
function escapeHtml(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function uid(){return Math.random().toString(36).slice(2,9);}
function money(n){return (Math.round((n||0)*100)/100).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2});}

function defaultState(){
  return { title:"Home Staff Ledger", staff:[], events:{}, payments:[] };
}

let lastSavedJSON = "";

async function load(){
  try{
    const res = await fetch('/api/data');
    const json = await res.json();
    state = json.value ? JSON.parse(json.value) : defaultState();
  }catch(e){
    state = defaultState();
  }
  lastSavedJSON = JSON.stringify(state);
  render();
  startPolling();
}

async function save(){
  try{
    lastSavedJSON = JSON.stringify(state);
    await fetch('/api/data', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: lastSavedJSON
    });
  }catch(e){
    console.error("save failed", e);
  }
}

// Poll every few seconds so changes made on another device show up here too.
function startPolling(){
  setInterval(async ()=>{
    if(sheet) return; // don't yank the screen while someone is mid-edit
    try{
      const res = await fetch('/api/data');
      const json = await res.json();
      const incoming = json.value ? JSON.parse(json.value) : defaultState();
      const incomingJSON = JSON.stringify(incoming);
      if(incomingJSON !== lastSavedJSON){
        state = incoming;
        lastSavedJSON = incomingJSON;
        render();
      }
    }catch(e){ /* ignore transient errors */ }
  }, 5000);
}

function getEvent(dateStr){
  if(!state.events[dateStr]) state.events[dateStr] = {extra:[], skip:[], tasks:[]};
  return state.events[dateStr];
}

function staffById(id){return state.staff.find(s=>s.id===id);}

// who is scheduled on a given date (returns array of staff)
function scheduledOn(dateStr){
  const d = parseDate(dateStr);
  const wd = d.getDay();
  const ev = state.events[dateStr] || {extra:[], skip:[]};
  const recurring = state.staff.filter(s => (s.days||[]).includes(wd) && !ev.skip.includes(s.id));
  const extras = (ev.extra||[]).map(id=>staffById(id)).filter(Boolean).filter(s=>!recurring.includes(s));
  return [...recurring, ...extras];
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="row" style="align-items:flex-start;">
      <div>
        <div class="ledger-title" contenteditable="true" id="titleEdit">${escapeHtml(state.title)}</div>
        <div class="ledger-sub">${state.staff.length} on staff &middot; ${new Date().toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'})}</div>
      </div>
    </div>
    <div class="tabs">
      ${tabBtn('day','Day')}${tabBtn('week','Week')}${tabBtn('month','Month')}${tabBtn('staff','Staff')}${tabBtn('pay','Pay')}
    </div>
    <div id="tabBody">${renderTab()}</div>
    ${activeTab==='staff' ? `<button class="fab" id="addStaffFab" aria-label="Add staff member">+</button>` : ''}
    ${(activeTab==='day') ? `<button class="fab" id="addTaskFab" aria-label="Add task">+</button>` : ''}
  `;
  bindHeader();
  bindTabBody();
  if(sheet) renderSheet(); else removeSheet();
}

function tabBtn(key,label){
  return `<button class="tab-btn ${activeTab===key?'active':''}" data-tab="${key}">${label}</button>`;
}

function bindHeader(){
  const t = document.getElementById('titleEdit');
  t.addEventListener('blur', ()=>{ state.title = t.textContent.trim() || "Home Staff Ledger"; save(); });
  t.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); t.blur(); }});
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.addEventListener('click', ()=>{ activeTab = b.dataset.tab; render(); });
  });
  const fabS = document.getElementById('addStaffFab');
  if(fabS) fabS.addEventListener('click', ()=>{ openSheet('editStaff', {id:null}); });
  const fabT = document.getElementById('addTaskFab');
  if(fabT) fabT.addEventListener('click', ()=>{ openSheet('addTask', {date:selectedDate}); });
}

function renderTab(){
  if(activeTab==='day') return renderDay();
  if(activeTab==='week') return renderWeek();
  if(activeTab==='month') return renderMonth();
  if(activeTab==='staff') return renderStaffList();
  if(activeTab==='pay') return renderPay();
  return '';
}

// ---------- DAY ----------
function renderDay(){
  const d = parseDate(selectedDate);
  const isToday = selectedDate === fmtDate(new Date());
  const list = scheduledOn(selectedDate);
  const ev = getEvent(selectedDate);
  const tasks = ev.tasks || [];
  return `
    <div class="day-nav">
      <button class="icon-btn" id="prevDay">&#8249;</button>
      <div style="text-align:center;">
        <div class="label">${DAY_FULL[d.getDay()]}, ${MONTH_NAMES[d.getMonth()]} ${d.getDate()}</div>
        <div class="sub">${isToday ? 'TODAY' : selectedDate}</div>
      </div>
      <button class="icon-btn" id="nextDay">&#8250;</button>
    </div>
    ${!isToday ? `<button class="btn btn-ghost btn-sm btn-block" id="jumpToday" style="margin-bottom:14px;">Jump to today</button>` : ''}
    <div class="meta-line" style="margin-bottom:8px; text-transform:uppercase; letter-spacing:0.05em; font-size:11px;">Scheduled (${list.length})</div>
    ${list.length === 0 ? `<div class="empty">Nobody's scheduled. Tap a staff card below to add someone for today.</div>` :
      list.map(s=>`
        <div class="card row">
          <div>
            <span class="pill role-${s.role}">${s.role}</span>
            <div class="name-line">${escapeHtml(s.name)}</div>
            <div class="meta-line">${s.time ? escapeHtml(s.time) : 'No time set'}</div>
          </div>
          <button class="icon-btn" data-remove-today="${s.id}" aria-label="Remove from today">&times;</button>
        </div>
      `).join('')
    }
    <button class="btn btn-ghost btn-block" id="addExtraStaff" style="margin:8px 0 18px;">+ Add someone for today</button>
    <div class="meta-line" style="margin-bottom:8px; text-transform:uppercase; letter-spacing:0.05em; font-size:11px;">Tasks</div>
    ${tasks.length===0 ? `<div class="empty">No tasks yet for this day.</div>` :
      `<div class="card">${tasks.map(t=>`
        <div class="task-row">
          <div class="checkbox ${t.done?'done':''}" data-toggle-task="${t.id}">${t.done?'&check;':''}</div>
          <div class="task-text ${t.done?'done':''}">${escapeHtml(t.text)}${t.staffId && staffById(t.staffId) ? ` <span class="meta-line">— ${escapeHtml(staffById(t.staffId).name)}</span>` : ''}</div>
          <button class="icon-btn" data-del-task="${t.id}" aria-label="Delete task">&times;</button>
        </div>
      `).join('')}</div>`
    }
  `;
}

function bindDay(){
  document.getElementById('prevDay').addEventListener('click', ()=>{ shiftDay(-1); });
  document.getElementById('nextDay').addEventListener('click', ()=>{ shiftDay(1); });
  const jt = document.getElementById('jumpToday'); if(jt) jt.addEventListener('click', ()=>{ selectedDate = fmtDate(new Date()); render(); });
  document.getElementById('addExtraStaff').addEventListener('click', ()=>{ openSheet('addExtra', {date:selectedDate}); });
  document.querySelectorAll('[data-remove-today]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const id = b.dataset.removeToday;
      const ev = getEvent(selectedDate);
      const d = parseDate(selectedDate);
      const isRecurring = (staffById(id)?.days||[]).includes(d.getDay());
      if(isRecurring){ if(!ev.skip.includes(id)) ev.skip.push(id); }
      ev.extra = ev.extra.filter(x=>x!==id);
      save(); render();
    });
  });
  document.querySelectorAll('[data-toggle-task]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const ev = getEvent(selectedDate);
      const t = ev.tasks.find(t=>t.id===b.dataset.toggleTask);
      if(t){ t.done = !t.done; save(); render(); }
    });
  });
  document.querySelectorAll('[data-del-task]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const ev = getEvent(selectedDate);
      ev.tasks = ev.tasks.filter(t=>t.id!==b.dataset.delTask);
      save(); render();
    });
  });
}
function shiftDay(delta){
  const d = parseDate(selectedDate);
  d.setDate(d.getDate()+delta);
  selectedDate = fmtDate(d);
  render();
}

// ---------- WEEK ----------
function startOfWeek(dateStr){
  const d = parseDate(dateStr);
  d.setDate(d.getDate()-d.getDay());
  return d;
}
function renderWeek(){
  const start = startOfWeek(selectedDate);
  const todayStr = fmtDate(new Date());
  let html = '<div class="week-grid">';
  for(let i=0;i<7;i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    const ds = fmtDate(d);
    const list = scheduledOn(ds);
    html += `
      <div class="week-day ${ds===todayStr?'is-today':''}" data-week-day="${ds}">
        <div class="week-day-head"><span>${DAY_FULL[i]} ${d.getDate()}</span><span>${list.length} scheduled</span></div>
        ${list.length===0 ? '<div class="meta-line">Nobody scheduled</div>' :
          `<div>${list.map(s=>`<span class="pill role-${s.role}">${escapeHtml(s.name)}</span>`).join('')}</div>`}
      </div>
    `;
  }
  html += '</div>';
  html += `<div class="row" style="margin-top:14px;">
    <button class="btn btn-ghost btn-sm" id="prevWeek">&#8249; Prev week</button>
    <button class="btn btn-ghost btn-sm" id="nextWeek">Next week &#8250;</button>
  </div>`;
  return html;
}
function bindWeek(){
  document.querySelectorAll('[data-week-day]').forEach(el=>{
    el.addEventListener('click', ()=>{ selectedDate = el.dataset.weekDay; activeTab='day'; render(); });
  });
  document.getElementById('prevWeek').addEventListener('click', ()=>{ shiftDay(-7); });
  document.getElementById('nextWeek').addEventListener('click', ()=>{ shiftDay(7); });
}

// ---------- MONTH ----------
function renderMonth(){
  const d = parseDate(selectedDate);
  const year = d.getFullYear(), month = d.getMonth();
  const first = new Date(year, month, 1);
  const startOffset = first.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayStr = fmtDate(new Date());
  let cells = '';
  for(let i=0;i<startOffset;i++) cells += `<div class="month-cell muted"></div>`;
  for(let day=1; day<=daysInMonth; day++){
    const ds = year+"-"+pad(month+1)+"-"+pad(day);
    const list = scheduledOn(ds);
    const dots = list.slice(0,6).map(s=>`<span class="dot dot-${s.role}"></span>`).join('');
    cells += `<div class="month-cell ${ds===todayStr?'is-today':''} ${ds===selectedDate?'is-selected':''}" data-month-day="${ds}">
      <span>${day}</span><div class="dots">${dots}</div>
    </div>`;
  }
  return `
    <div class="month-switch">
      <button class="icon-btn" id="prevMonth">&#8249;</button>
      <div class="label">${MONTH_NAMES[month]} ${year}</div>
      <button class="icon-btn" id="nextMonth">&#8250;</button>
    </div>
    <div class="month-grid">${DAY_LABELS.map(l=>`<div class="month-head">${l}</div>`).join('')}${cells}</div>
  `;
}
function bindMonth(){
  document.getElementById('prevMonth').addEventListener('click', ()=>{ shiftMonth(-1); });
  document.getElementById('nextMonth').addEventListener('click', ()=>{ shiftMonth(1); });
  document.querySelectorAll('[data-month-day]').forEach(el=>{
    el.addEventListener('click', ()=>{ selectedDate = el.dataset.monthDay; activeTab='day'; render(); });
  });
}
function shiftMonth(delta){
  const d = parseDate(selectedDate);
  d.setMonth(d.getMonth()+delta, 1);
  selectedDate = fmtDate(d);
  render();
}

// ---------- STAFF ----------
function renderStaffList(){
  if(state.staff.length===0) return `<div class="empty">No staff yet. Tap + to add your first worker.</div>`;
  return state.staff.map(s=>`
    <div class="card tab-card" data-staff-card="${s.id}">
      <span class="role-tab role-${s.role}">${s.role}</span>
      <div class="row">
        <div>
          <div class="name-line">${escapeHtml(s.name)}</div>
          <div class="meta-line">${(s.days||[]).slice().sort().map(i=>DAY_LABELS[i]).join(' ') || 'No regular days'} ${s.time?(' · '+escapeHtml(s.time)):''}</div>
          <div class="meta-line">${s.payType==='monthly' ? 'Monthly: ' : 'Per day: '}${money(s.payRate||0)}${s.phone?(' · '+escapeHtml(s.phone)):''}</div>
        </div>
        <button class="icon-btn" data-edit-staff="${s.id}" aria-label="Edit">&#9998;</button>
      </div>
    </div>
  `).join('');
}
function bindStaff(){
  document.querySelectorAll('[data-edit-staff]').forEach(b=>{
    b.addEventListener('click', ()=>{ openSheet('editStaff', {id:b.dataset.editStaff}); });
  });
}

// ---------- PAY ----------
function renderPay(){
  const [y,m] = payMonth.split('-').map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();
  const isCurrentMonth = payMonth === todayYM();
  const dayCountThrough = isCurrentMonth ? new Date().getDate() : daysInMonth;

  let rows = state.staff.map(s=>{
    const pays = state.payments.filter(p=>p.staffId===s.id && p.date.startsWith(payMonth));
    const paid = pays.reduce((a,p)=>a+Number(p.amount),0);
    let expected = 0;
    if(s.payType==='monthly'){ expected = Number(s.payRate||0); }
    else {
      let count=0;
      for(let day=1; day<=dayCountThrough; day++){
        const ds = y+"-"+pad(m)+"-"+pad(day);
        const wd = parseDate(ds).getDay();
        const ev = state.events[ds];
        if((s.days||[]).includes(wd) && !(ev && ev.skip && ev.skip.includes(s.id))) count++;
        else if(ev && ev.extra && ev.extra.includes(s.id)) count++;
      }
      expected = count * Number(s.payRate||0);
    }
    const due = Math.max(0, expected - paid);
    return {s, paid, expected, due};
  });
  const grandPaid = rows.reduce((a,r)=>a+r.paid,0);
  const grandDue = rows.reduce((a,r)=>a+r.due,0);

  return `
    <div class="month-switch">
      <button class="icon-btn" id="prevPayMonth">&#8249;</button>
      <div class="label">${MONTH_NAMES[m-1]} ${y}</div>
      <button class="icon-btn" id="nextPayMonth">&#8250;</button>
    </div>
    <div class="card">
      <div class="stat-row"><span>Paid this month</span><span class="stat-num">${money(grandPaid)}</span></div>
      <div class="stat-row"><span>Outstanding</span><span class="stat-num ${grandDue>0?'due-pos':'due-zero'}">${money(grandDue)}</span></div>
    </div>
    ${rows.length===0 ? `<div class="empty">Add staff first to track pay.</div>` :
      rows.map(r=>`
        <div class="card">
          <div class="row">
            <div>
              <span class="pill role-${r.s.role}">${r.s.role}</span>
              <div class="name-line">${escapeHtml(r.s.name)}</div>
              <div class="meta-line">Expected ${money(r.expected)} · Paid ${money(r.paid)}</div>
            </div>
            <button class="btn btn-primary btn-sm" data-log-pay="${r.s.id}">Log payment</button>
          </div>
          <div class="stat-row" style="border-top:1px solid var(--line); margin-top:8px; padding-top:8px;">
            <span class="meta-line">Outstanding</span>
            <span class="stat-num ${r.due>0?'due-pos':'due-zero'}">${money(r.due)}</span>
          </div>
        </div>
      `).join('')
    }
  `;
}
function bindPay(){
  document.getElementById('prevPayMonth').addEventListener('click', ()=>{ shiftPayMonth(-1); });
  document.getElementById('nextPayMonth').addEventListener('click', ()=>{ shiftPayMonth(1); });
  document.querySelectorAll('[data-log-pay]').forEach(b=>{
    b.addEventListener('click', ()=>{ openSheet('logPay', {staffId:b.dataset.logPay}); });
  });
}
function shiftPayMonth(delta){
  let [y,m] = payMonth.split('-').map(Number);
  m += delta;
  if(m<1){m=12; y--;} if(m>12){m=1; y++;}
  payMonth = y+"-"+pad(m);
  render();
}

function bindTabBody(){
  if(activeTab==='day') bindDay();
  if(activeTab==='week') bindWeek();
  if(activeTab==='month') bindMonth();
  if(activeTab==='staff') bindStaff();
  if(activeTab==='pay') bindPay();
}

// ---------- SHEETS (bottom modal forms) ----------
function openSheet(type, payload){ sheet = {type, payload}; renderSheet(); }
function closeSheet(){ sheet = null; removeSheet(); }
function removeSheet(){ const ex = document.getElementById('sheetBackdrop'); if(ex) ex.remove(); }

function renderSheet(){
  removeSheet();
  const div = document.createElement('div');
  div.id = 'sheetBackdrop';
  div.className = 'sheet-backdrop';
  div.innerHTML = `<div class="sheet" id="sheetInner"></div>`;
  document.body.appendChild(div);
  div.addEventListener('click', (e)=>{ if(e.target===div) closeSheet(); });
  const inner = document.getElementById('sheetInner');

  if(sheet.type==='editStaff'){
    const existing = sheet.payload.id ? staffById(sheet.payload.id) : null;
    const s = existing || {id:null, name:'', role:'Cook', phone:'', payType:'daily', payRate:'', days:[], time:'', notes:''};
    inner.innerHTML = `
      <div class="sheet-head"><h3>${existing?'Edit':'Add'} staff member</h3><button class="icon-btn" id="closeSheet">&times;</button></div>
      <div class="field"><label>Name</label><input id="f-name" value="${escapeHtml(s.name)}" placeholder="e.g. Maria"/></div>
      <div class="field"><label>Role</label><select id="f-role">${ROLES.map(r=>`<option value="${r}" ${s.role===r?'selected':''}>${r}</option>`).join('')}</select></div>
      <div class="field"><label>Phone</label><input id="f-phone" value="${escapeHtml(s.phone)}" placeholder="optional"/></div>
      <div class="field"><label>Regular days</label><div class="day-chips">${DAY_LABELS.map((l,i)=>`<button type="button" class="day-chip ${(s.days||[]).includes(i)?'on':''}" data-day="${i}">${l}</button>`).join('')}</div></div>
      <div class="field"><label>Usual time</label><input id="f-time" value="${escapeHtml(s.time)}" placeholder="e.g. 8am – 2pm"/></div>
      <div class="field"><label>Pay type</label><select id="f-paytype"><option value="daily" ${s.payType==='daily'?'selected':''}>Per day</option><option value="monthly" ${s.payType==='monthly'?'selected':''}>Monthly salary</option></select></div>
      <div class="field"><label>Pay rate</label><input id="f-payrate" type="number" inputmode="decimal" value="${s.payRate}" placeholder="0"/></div>
      <div class="field"><label>Notes</label><textarea id="f-notes" rows="2" placeholder="optional">${escapeHtml(s.notes||'')}</textarea></div>
      <button class="btn btn-primary btn-block" id="saveStaff">Save</button>
      ${existing ? `<button class="btn btn-ghost btn-block" id="deleteStaff" style="margin-top:8px; color:var(--clay);">Remove staff member</button>` : ''}
    `;
    let selDays = new Set(s.days||[]);
    inner.querySelectorAll('[data-day]').forEach(chip=>{
      chip.addEventListener('click', ()=>{
        const i = Number(chip.dataset.day);
        if(selDays.has(i)){selDays.delete(i); chip.classList.remove('on');} else {selDays.add(i); chip.classList.add('on');}
      });
    });
    document.getElementById('saveStaff').addEventListener('click', ()=>{
      const name = document.getElementById('f-name').value.trim();
      if(!name){ document.getElementById('f-name').focus(); return; }
      const obj = {
        id: s.id || uid(),
        name,
        role: document.getElementById('f-role').value,
        phone: document.getElementById('f-phone').value.trim(),
        days: Array.from(selDays),
        time: document.getElementById('f-time').value.trim(),
        payType: document.getElementById('f-paytype').value,
        payRate: Number(document.getElementById('f-payrate').value)||0,
        notes: document.getElementById('f-notes').value.trim()
      };
      if(existing){ Object.assign(existing, obj); }
      else { state.staff.push(obj); }
      save(); closeSheet(); render();
    });
    const delBtn = document.getElementById('deleteStaff');
    if(delBtn) delBtn.addEventListener('click', ()=>{
      state.staff = state.staff.filter(x=>x.id!==s.id);
      save(); closeSheet(); render();
    });
  }

  if(sheet.type==='addExtra'){
    const date = sheet.payload.date;
    const already = new Set(scheduledOn(date).map(s=>s.id));
    const options = state.staff.filter(s=>!already.has(s.id));
    inner.innerHTML = `
      <div class="sheet-head"><h3>Add for ${date}</h3><button class="icon-btn" id="closeSheet">&times;</button></div>
      ${options.length===0 ? `<div class="empty">Everyone is already scheduled for this day.</div>` :
        options.map(s=>`<button class="btn btn-ghost btn-block" data-pick-extra="${s.id}" style="margin-bottom:8px; text-align:left;">${s.name} <span class="meta-line">· ${s.role}</span></button>`).join('')}
    `;
    inner.querySelectorAll('[data-pick-extra]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const ev = getEvent(date);
        if(!ev.extra.includes(b.dataset.pickExtra)) ev.extra.push(b.dataset.pickExtra);
        save(); closeSheet(); render();
      });
    });
  }

  if(sheet.type==='addTask'){
    const date = sheet.payload.date;
    inner.innerHTML = `
      <div class="sheet-head"><h3>New task</h3><button class="icon-btn" id="closeSheet">&times;</button></div>
      <div class="field"><label>Task</label><input id="f-task" placeholder="e.g. Water the front garden"/></div>
      <div class="field"><label>Assign to (optional)</label><select id="f-task-staff"><option value="">Nobody specific</option>${state.staff.map(s=>`<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('')}</select></div>
      <button class="btn btn-primary btn-block" id="saveTask">Add task</button>
    `;
    document.getElementById('saveTask').addEventListener('click', ()=>{
      const text = document.getElementById('f-task').value.trim();
      if(!text) return;
      const ev = getEvent(date);
      ev.tasks.push({id:uid(), text, staffId: document.getElementById('f-task-staff').value || null, done:false});
      save(); closeSheet(); render();
    });
  }

  if(sheet.type==='logPay'){
    const s = staffById(sheet.payload.staffId);
    inner.innerHTML = `
      <div class="sheet-head"><h3>Log payment — ${escapeHtml(s.name)}</h3><button class="icon-btn" id="closeSheet">&times;</button></div>
      <div class="field"><label>Amount</label><input id="f-amount" type="number" inputmode="decimal" placeholder="0"/></div>
      <div class="field"><label>Date</label><input id="f-pdate" type="date" value="${fmtDate(new Date())}"/></div>
      <div class="field"><label>Note (optional)</label><input id="f-pnote" placeholder="e.g. half month advance"/></div>
      <button class="btn btn-primary btn-block" id="savePay">Save payment</button>
    `;
    document.getElementById('savePay').addEventListener('click', ()=>{
      const amount = Number(document.getElementById('f-amount').value);
      if(!amount) return;
      state.payments.push({id:uid(), staffId:s.id, date:document.getElementById('f-pdate').value, amount, note:document.getElementById('f-pnote').value.trim()});
      save(); closeSheet(); render();
    });
  }

  document.getElementById('closeSheet').addEventListener('click', closeSheet);
}

load();
</script>
</body>
</html>
